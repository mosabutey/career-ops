# Portal Scanner Configuration
# Copy this file to portals.yml in the project root and customize it.
#
# This template is designed for scientific, clinical, consulting, health-tech,
# and adjacent strategy pathways. It supports both role-pack targeting and
# career-stage targeting.

role_pack_filters:
  enabled:
    - "biopharma_medical"
    - "life_sciences_consulting"
    - "healthtech_scientific"
    - "adjacent_generalist"

career_stage_filters:
  enabled:
    - "student_early"
    - "advanced_training"
    - "experienced_professional"

sponsorship_signals:
  explicit_open:
    - "visa sponsorship available"
    - "open to sponsorship"
    - "will sponsor"
    - "OPT"
    - "CPT"
    - "STEM OPT"
    - "visa transfer"
    - "H-1B transfer"
  explicit_closed:
    - "will not sponsor"
    - "no sponsorship"
    - "no visa sponsorship"
    - "not eligible for visa sponsorship"
    - "must be authorized to work in the U.S. without sponsorship"
    - "must have permanent work authorization"
    - "no visa transfer"
  restricted:
    - "U.S. citizen"
    - "U.S. citizenship required"
    - "permanent resident"
    - "green card required"
    - "security clearance"
    - "export control"

title_filter:
  positive:
    # Biopharma / medical affairs / clinical science
    - "Medical Affairs"
    - "Medical Science Liaison"
    - "MSL"
    - "Clinical Scientist"
    - "Scientific Affairs"
    - "Translational"
    - "Biomarker"
    - "Clinical Development"
    - "Medical Director"
    - "Therapeutic Area"
    # Life sciences consulting / diligence / strategy
    - "Life Sciences Consultant"
    - "Healthcare Consultant"
    - "Strategy"
    - "Consulting"
    - "Advisory"
    - "Due Diligence"
    - "Market Access"
    - "Commercial Strategy"
    # Health-tech / scientific product / operations
    - "Clinical Strategy"
    - "Scientific Product"
    - "Medical Content"
    - "Solutions Consultant"
    - "Partnerships"
    - "Program Manager"
    - "Scientific Communications"
    - "Clinical Operations"
    # Student and trainee pathways
    - "Intern"
    - "Internship"
    - "Externship"
    - "Co-op"
    - "Fellowship"
    - "Trainee"
    - "Rotational"
    - "Associate"
  negative:
    - "Veterinarian"
    - "Dentist"
    - "Pure bench technician"
    - "Licensed pharmacist required"
    - "Territory sales only"
    - "Commission-only"
    - "Manufacturing line operator"
    - "Embedded"
    - "Blockchain"
    - "Crypto"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Principal"
    - "Manager"
    - "Director"
    - "Associate Director"
    - "Head"

search_queries:
  - name: "Biopharma Medical Affairs"
    query: 'site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io OR site:jobs.lever.co "Medical Affairs" OR "Medical Science Liaison" OR "Clinical Scientist" remote'
    enabled: true

  - name: "Translational and Biomarker Roles"
    query: 'site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io translational OR biomarker OR "clinical development" scientist'
    enabled: true

  - name: "Life Sciences Consulting"
    query: 'site:job-boards.greenhouse.io OR site:jobs.lever.co OR site:careers.pwc.com "life sciences" consulting OR "healthcare strategy" OR "commercial diligence"'
    enabled: true

  - name: "Health-Tech Scientific Strategy"
    query: 'site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io OR site:jobs.lever.co "clinical strategy" OR "scientific product" OR "medical content" OR "solutions consultant"'
    enabled: true

  - name: "Student and Trainee Programs"
    query: 'site:job-boards.greenhouse.io OR site:jobs.lever.co internship OR externship OR fellowship OR co-op "life sciences" OR biotech OR healthtech'
    enabled: true

tracked_companies:
  - name: "Genentech"
    company_class: "biotech_pharma"
    role_packs:
      - "biopharma_medical"
    careers_url: "https://careers.gene.com/us/en"
    scan_method: "websearch"
    scan_query: 'site:careers.gene.com/us/en "medical affairs" OR "clinical scientist" OR "scientific affairs"'
    enabled: true

  - name: "Novartis"
