name: Bug Report
description: Report a bug in Career-Ops LifeSci
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What should someone else do to reproduce it?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect instead?
  - type: input
    id: audience
    attributes:
      label: Affected user path
      placeholder: "e.g., student internship flow, medical affairs resume, consulting comparison"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 15, Ubuntu 24.04, Windows 11"
  - type: markdown
    attributes:
      value: |
        ---
        Please do not include personal CVs, private company data, or identifying information in bug reports.
