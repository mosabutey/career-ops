name: Feature Request
description: Suggest a feature, workflow improvement, or experience upgrade
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or limitation does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should the feature work?
    validations:
      required: true
  - type: input
    id: audience
    attributes:
      label: Primary audience
      placeholder: "e.g., PhD candidates, medical affairs applicants, consulting interns"
  - type: markdown
    attributes:
      value: |
        ---
        Career-Ops LifeSci is a community-first evolution of the original project by [santifer](https://santifer.io). Please keep contributions broad enough to help more than one user story.
